name: Sync Prisma Client from Supabase

# Utility workflow: pulls the latest schema from Supabase and regenerates
# the Prisma client. Useful after applying Supabase migrations to verify
# the Prisma schema stays in sync.
#
# NOTE: DB migrations are managed by Supabase's GitHub Integration.
# Schema changes go in supabase/migrations/*.sql — NOT Prisma migrations.

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        type: choice
        options: [staging, production]

jobs:
  sync-prisma:
    name: Sync Prisma Schema
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --workspace=@coverguard/api

      - name: Sanitize Supabase secrets
        run: |
          CLEAN_ID="$(printf '%s' "$RAW_PROJECT_ID" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"
          CLEAN_PW="$(printf '%s' "$RAW_DB_PASSWORD" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"
          CLEAN_POOLER="$(printf '%s' "$RAW_POOLER_HOST" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"

          if [ -z "$CLEAN_ID" ] || [ -z "$CLEAN_PW" ] || [ -z "$CLEAN_POOLER" ]; then
            echo "::error::SUPABASE_PROJECT_ID, SUPABASE_DB_PASSWORD, and/or SUPABASE_POOLER_HOST secrets are not configured"
            exit 1
          fi

          {
            echo "SUPABASE_PROJECT_ID<<GHEOF"
            printf '%s\n' "$CLEAN_ID"
            echo "GHEOF"
            echo "SUPABASE_DB_PASSWORD<<GHEOF"
            printf '%s\n' "$CLEAN_PW"
            echo "GHEOF"
            echo "SUPABASE_POOLER_HOST<<GHEOF"
            printf '%s\n' "$CLEAN_POOLER"
            echo "GHEOF"
          } >> "$GITHUB_ENV"
        env:
          RAW_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
          RAW_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          RAW_POOLER_HOST: ${{ secrets.SUPABASE_POOLER_HOST }}

      - name: Build connection URLs
        run: |
          ENCODED_PW=$(node -e "process.stdout.write(encodeURIComponent(process.env.SUPABASE_DB_PASSWORD))")
          POOLER_HOST="${SUPABASE_POOLER_HOST}"
          DIRECT_HOST="db.${SUPABASE_PROJECT_ID}.supabase.co"
          DB_USER="postgres.${SUPABASE_PROJECT_ID}"

          {
            echo "DATABASE_URL<<GHEOF"
            printf '%s\n' "postgresql://${DB_USER}:${ENCODED_PW}@${POOLER_HOST}:6543/postgres?pgbouncer=true"
            echo "GHEOF"
            echo "DIRECT_URL<<GHEOF"
            printf '%s\n' "postgresql://postgres:${ENCODED_PW}@${DIRECT_HOST}:5432/postgres"
            echo "GHEOF"
          } >> "$GITHUB_ENV"

          echo "Connection URLs built — pooler: ${POOLER_HOST}, direct: ${DIRECT_HOST}"

      - name: Pull schema from Supabase
        working-directory: apps/api
        run: npx prisma db pull

      - name: Generate Prisma client
        working-directory: apps/api
        run: npx prisma generate

      - name: Show schema diff
        run: git diff apps/api/prisma/schema.prisma || echo "No schema changes detected"
