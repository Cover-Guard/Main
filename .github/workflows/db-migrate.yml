name: Database Migration

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        type: choice
        options: [staging, production]
      dry_run:
        description: Dry run (show migration plan without applying)
        type: boolean
        default: true

jobs:
  migrate:
    name: Run Prisma Migration
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --workspace=@coverguard/api

      - name: Sanitize Supabase secrets
        run: |
          # Trim leading/trailing whitespace from secrets (common copy-paste issue).
          # Write cleaned values to $GITHUB_ENV so every subsequent step gets them.
          CLEAN_ID="$(printf '%s' "$RAW_PROJECT_ID" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"
          CLEAN_PW="$(printf '%s' "$RAW_DB_PASSWORD" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"
          CLEAN_REGION="$(printf '%s' "$RAW_DB_REGION" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"

          if [ -z "$CLEAN_ID" ] || [ -z "$CLEAN_PW" ] || [ -z "$CLEAN_REGION" ]; then
            echo "::error::SUPABASE_PROJECT_ID, SUPABASE_DB_PASSWORD, and/or SUPABASE_DB_REGION secrets are not configured in the '${{ inputs.environment }}' environment"
            exit 1
          fi

          [ "$CLEAN_ID" != "$RAW_PROJECT_ID" ] && echo "::warning::SUPABASE_PROJECT_ID had leading/trailing whitespace — auto-trimmed"
          [ "$CLEAN_PW" != "$RAW_DB_PASSWORD" ] && echo "::warning::SUPABASE_DB_PASSWORD had leading/trailing whitespace — auto-trimmed"
          [ "$CLEAN_REGION" != "$RAW_DB_REGION" ] && echo "::warning::SUPABASE_DB_REGION had leading/trailing whitespace — auto-trimmed"

          echo "SUPABASE_PROJECT_ID=${CLEAN_ID}" >> $GITHUB_ENV
          echo "SUPABASE_DB_PASSWORD=${CLEAN_PW}" >> $GITHUB_ENV
          echo "SUPABASE_DB_REGION=${CLEAN_REGION}" >> $GITHUB_ENV
          echo "Supabase secrets present and sanitized. Project ID length: ${#CLEAN_ID}"
        env:
          RAW_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
          RAW_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          RAW_DB_REGION: ${{ secrets.SUPABASE_DB_REGION }}

      - name: Verify database connectivity
        run: |
          POOLER_HOST="aws-0-${SUPABASE_DB_REGION}.pooler.supabase.com"
          DIRECT_HOST="db.${SUPABASE_PROJECT_ID}.supabase.co"
          MAX_RETRIES=4
          DELAY=2

          echo "Testing pooler connectivity (${POOLER_HOST}:6543)..."
          for i in $(seq 1 $MAX_RETRIES); do
            echo "Attempt $i/$MAX_RETRIES: Testing TCP connectivity to ${POOLER_HOST}:6543..."
            if nc -z -w 10 "${POOLER_HOST}" 6543 2>/dev/null; then
              echo "Pooler is reachable on port 6543"
              break
            fi
            if [ "$i" -eq "$MAX_RETRIES" ]; then
              echo "::error::Cannot reach ${POOLER_HOST}:6543 after $MAX_RETRIES attempts from GitHub Actions"
              exit 1
            fi
            echo "Connection failed, retrying in ${DELAY}s..."
            sleep $DELAY
            DELAY=$((DELAY * 2))
          done

          DELAY=2
          echo "Testing direct DB connectivity (${DIRECT_HOST}:5432)..."
          for i in $(seq 1 $MAX_RETRIES); do
            echo "Attempt $i/$MAX_RETRIES: Testing TCP connectivity to ${DIRECT_HOST}:5432..."
            if nc -z -w 10 "${DIRECT_HOST}" 5432 2>/dev/null; then
              echo "Direct DB host is reachable on port 5432"
              exit 0
            fi
            if [ "$i" -eq "$MAX_RETRIES" ]; then
              echo "::warning::Cannot reach ${DIRECT_HOST}:5432 — falling back to pooler session mode for migrations"
              exit 0
            fi
            echo "Connection failed, retrying in ${DELAY}s..."
            sleep $DELAY
            DELAY=$((DELAY * 2))
          done

      - name: Build connection URLs
        id: db-urls
        run: |
          ENCODED_PW=$(node -e "process.stdout.write(encodeURIComponent(process.env.SUPABASE_DB_PASSWORD))")
          POOLER_HOST="aws-0-${SUPABASE_DB_REGION}.pooler.supabase.com"
          DB_USER="postgres.${SUPABASE_PROJECT_ID}"
          echo "database_url=postgresql://${DB_USER}:${ENCODED_PW}@${POOLER_HOST}:6543/postgres?pgbouncer=true" >> $GITHUB_OUTPUT
          echo "direct_url=postgresql://postgres:${ENCODED_PW}@db.${SUPABASE_PROJECT_ID}.supabase.co:5432/postgres" >> $GITHUB_OUTPUT

      - name: Show migration status
        working-directory: apps/api
        run: npx prisma migrate status
        env:
          DATABASE_URL: ${{ steps.db-urls.outputs.database_url }}
          DIRECT_URL: ${{ steps.db-urls.outputs.direct_url }}

      - name: Apply migrations
        if: ${{ !inputs.dry_run }}
        working-directory: apps/api
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: ${{ steps.db-urls.outputs.database_url }}
          DIRECT_URL: ${{ steps.db-urls.outputs.direct_url }}
