name: Deploy to Vercel

on:
  push:
    branches: [main]

env:
  PRODUCTION_URL: https://coverguard.io
  API_URL: https://api.coverguard.io

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  # ── Run DB Migrations ─────────────────────────────────────────────────────────
  migrate:
    name: Run DB Migrations
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci --workspace=@coverguard/api

      - name: Sanitize Supabase secrets
        run: |
          # Trim leading/trailing whitespace from secrets (common copy-paste issue).
          # Write cleaned values to $GITHUB_ENV so every subsequent step gets them.
          CLEAN_ID="$(printf '%s' "$RAW_PROJECT_ID" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"
          CLEAN_PW="$(printf '%s' "$RAW_DB_PASSWORD" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"
          CLEAN_REGION="$(printf '%s' "$RAW_DB_REGION" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"

          if [ -z "$CLEAN_ID" ] || [ -z "$CLEAN_PW" ] || [ -z "$CLEAN_REGION" ]; then
            echo "::error::SUPABASE_PROJECT_ID, SUPABASE_DB_PASSWORD, and/or SUPABASE_DB_REGION secrets are not configured in the 'production' environment. Add these secrets in GitHub Settings → Environments → production → Environment secrets."
            exit 1
          fi

          # Warn if trimming actually changed anything
          [ "$CLEAN_ID" != "$RAW_PROJECT_ID" ] && echo "::warning::SUPABASE_PROJECT_ID had leading/trailing whitespace — auto-trimmed"
          [ "$CLEAN_PW" != "$RAW_DB_PASSWORD" ] && echo "::warning::SUPABASE_DB_PASSWORD had leading/trailing whitespace — auto-trimmed"
          [ "$CLEAN_REGION" != "$RAW_DB_REGION" ] && echo "::warning::SUPABASE_DB_REGION had leading/trailing whitespace — auto-trimmed"

          echo "SUPABASE_PROJECT_ID=${CLEAN_ID}" >> $GITHUB_ENV
          echo "SUPABASE_DB_PASSWORD=${CLEAN_PW}" >> $GITHUB_ENV
          echo "SUPABASE_DB_REGION=${CLEAN_REGION}" >> $GITHUB_ENV
          echo "Project ID length: ${#CLEAN_ID}, Password length: ${#CLEAN_PW}, Region: ${CLEAN_REGION}"
        env:
          RAW_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
          RAW_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          RAW_DB_REGION: ${{ secrets.SUPABASE_DB_REGION }}

      - name: Verify database connectivity
        id: check-db-url
        run: |
          # Use the Supabase connection pooler instead of the direct connection
          # (db.*.supabase.co:5432) which is IPv6-only and unreachable from
          # GitHub Actions runners.
          POOLER_HOST="aws-0-${SUPABASE_DB_REGION}.pooler.supabase.com"

          # Retry connectivity check with exponential backoff.
          # GitHub Actions runners sometimes need a moment to establish
          # outbound connectivity to cloud database endpoints.
          MAX_RETRIES=4
          DELAY=2
          CONNECTED=false

          for i in $(seq 1 $MAX_RETRIES); do
            echo "Attempt $i/$MAX_RETRIES: Testing TCP connectivity to ${POOLER_HOST}..."

            # Try transaction-mode port (6543) first, then session-mode port (5432).
            # Prisma uses DIRECT_URL (port 5432) for migrations, but checking both
            # ports helps diagnose whether the host is reachable at all.
            if nc -z -w 10 "${POOLER_HOST}" 6543 2>/dev/null; then
              echo "Pooler reachable on port 6543 (transaction mode)"
            fi

            if nc -z -w 10 "${POOLER_HOST}" 5432 2>/dev/null; then
              echo "Pooler reachable on port 5432 (session mode)"
              CONNECTED=true
              break
            fi

            if [ "$i" -lt "$MAX_RETRIES" ]; then
              echo "Connection failed, retrying in ${DELAY}s..."
              sleep $DELAY
              DELAY=$((DELAY * 2))
            fi
          done

          if [ "$CONNECTED" = "true" ]; then
            echo "Database is reachable"
            echo "db_url_set=true" >> $GITHUB_OUTPUT
          else
            echo "::error::Cannot reach ${POOLER_HOST}:5432 after $MAX_RETRIES attempts from GitHub Actions. Verify that SUPABASE_DB_REGION is correct and the Supabase project is active."
            exit 1
          fi

      - name: Build connection URLs
        if: steps.check-db-url.outputs.db_url_set == 'true'
        id: db-urls
        run: |
          # URL-encode the password to handle special characters (@, #, %, etc.)
          ENCODED_PW=$(node -e "process.stdout.write(encodeURIComponent(process.env.SUPABASE_DB_PASSWORD))")
          POOLER_HOST="aws-0-${SUPABASE_DB_REGION}.pooler.supabase.com"
          DB_USER="postgres.${SUPABASE_PROJECT_ID}"

          echo "database_url=postgresql://${DB_USER}:${ENCODED_PW}@${POOLER_HOST}:6543/postgres?pgbouncer=true" >> $GITHUB_OUTPUT
          echo "direct_url=postgresql://${DB_USER}:${ENCODED_PW}@${POOLER_HOST}:5432/postgres" >> $GITHUB_OUTPUT

      - name: Run Prisma migrations
        if: steps.check-db-url.outputs.db_url_set == 'true'
        working-directory: apps/api
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: ${{ steps.db-urls.outputs.database_url }}
          DIRECT_URL: ${{ steps.db-urls.outputs.direct_url }}

  # ── Deploy Web to Vercel ──────────────────────────────────────────────────────
  deploy-web:
    name: Deploy Web to Vercel
    runs-on: ubuntu-latest
    needs: [migrate]
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Ensure node/npm accessible to child processes
        run: |
          NODE_BIN_DIR="$(dirname "$(which node)")"
          echo "$NODE_BIN_DIR" >> $GITHUB_PATH
          sudo ln -sf "$NODE_BIN_DIR/node" /usr/local/bin/node
          sudo ln -sf "$NODE_BIN_DIR/npm" /usr/local/bin/npm
          sudo ln -sf "$NODE_BIN_DIR/npx" /usr/local/bin/npx

      - name: Install dependencies
        run: npm ci

      - name: Install Vercel CLI and turbo globally
        run: npm install --global vercel@latest turbo

      - name: Set up Vercel project link
        run: |
          mkdir -p .vercel
          echo '{"projectId":"'"$VERCEL_PROJECT_ID"'","orgId":"'"$VERCEL_ORG_ID"'"}' > .vercel/project.json
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_WEB_PROJECT_ID }}

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_WEB_PROJECT_ID }}

      - name: Build project
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_WEB_PROJECT_ID }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_API_URL: ${{ env.API_URL }}
          NEXT_PUBLIC_SITE_URL: ${{ env.PRODUCTION_URL }}

      - name: Deploy to Vercel production
        id: deploy
        run: |
          MAX_RETRIES=3
          for i in $(seq 1 $MAX_RETRIES); do
            echo "Deployment attempt $i/$MAX_RETRIES..."
            if DEPLOY_URL=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}); then
              echo "url=${DEPLOY_URL}" >> $GITHUB_OUTPUT
              break
            elif [ "$i" -lt "$MAX_RETRIES" ]; then
              echo "Attempt $i failed, retrying in 30s..."
              sleep 30
            else
              echo "All $MAX_RETRIES deployment attempts failed"
              exit 1
            fi
          done
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_WEB_PROJECT_ID }}

      - name: Deployment summary
        run: |
          SHORT_SHA="${GITHUB_SHA:0:7}"
          echo "### Deployed to Production (Vercel)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **Production URL** | [${PRODUCTION_URL}](${PRODUCTION_URL}) |" >> $GITHUB_STEP_SUMMARY
          echo "| **Vercel URL** | ${{ steps.deploy.outputs.url }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`${SHORT_SHA}\` |" >> $GITHUB_STEP_SUMMARY

  # ── Deploy API to Vercel ──────────────────────────────────────────────────────
  deploy-api:
    name: Deploy API to Vercel
    runs-on: ubuntu-latest
    needs: [migrate]
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Ensure node/npm accessible to child processes
        run: |
          NODE_BIN_DIR="$(dirname "$(which node)")"
          echo "$NODE_BIN_DIR" >> $GITHUB_PATH
          sudo ln -sf "$NODE_BIN_DIR/node" /usr/local/bin/node
          sudo ln -sf "$NODE_BIN_DIR/npm" /usr/local/bin/npm
          sudo ln -sf "$NODE_BIN_DIR/npx" /usr/local/bin/npx

      - name: Install dependencies
        run: npm ci

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      # Build shared package first (API depends on it), then generate
      # Prisma client and bundle the API into dist/index.js via tsup.
      - name: Build shared package
        run: npm run build --workspace=@coverguard/shared

      - name: Sanitize Supabase secrets
        run: |
          CLEAN_ID="$(printf '%s' "$RAW_PROJECT_ID" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"
          CLEAN_PW="$(printf '%s' "$RAW_DB_PASSWORD" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"
          CLEAN_REGION="$(printf '%s' "$RAW_DB_REGION" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"
          echo "SUPABASE_PROJECT_ID=${CLEAN_ID}" >> $GITHUB_ENV
          echo "SUPABASE_DB_PASSWORD=${CLEAN_PW}" >> $GITHUB_ENV
          echo "SUPABASE_DB_REGION=${CLEAN_REGION}" >> $GITHUB_ENV
        env:
          RAW_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
          RAW_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          RAW_DB_REGION: ${{ secrets.SUPABASE_DB_REGION }}

      - name: Build DB connection URLs
        id: api-db-urls
        run: |
          ENCODED_PW=$(node -e "process.stdout.write(encodeURIComponent(process.env.SUPABASE_DB_PASSWORD))")
          POOLER_HOST="aws-0-${SUPABASE_DB_REGION}.pooler.supabase.com"
          DB_USER="postgres.${SUPABASE_PROJECT_ID}"
          echo "database_url=postgresql://${DB_USER}:${ENCODED_PW}@${POOLER_HOST}:6543/postgres?pgbouncer=true" >> $GITHUB_OUTPUT
          echo "direct_url=postgresql://${DB_USER}:${ENCODED_PW}@${POOLER_HOST}:5432/postgres" >> $GITHUB_OUTPUT

      - name: Generate Prisma client
        working-directory: apps/api
        run: npx prisma generate
        env:
          DATABASE_URL: ${{ steps.api-db-urls.outputs.database_url }}
          DIRECT_URL: ${{ steps.api-db-urls.outputs.direct_url }}

      - name: Build API bundle
        run: npm run build --workspace=@coverguard/api

      # Remove the workspace file: dependency so Vercel installs from
      # the registry instead of trying to resolve the monorepo link.
      # The shared package is already inlined in the tsup bundle.
      - name: Strip workspace dep from package.json
        working-directory: apps/api
        run: |
          node -e "
            const p = require('./package.json');
            delete p.dependencies['@coverguard/shared'];
            require('fs').writeFileSync('package.json', JSON.stringify(p, null, 2) + '\n');
          "

      - name: Set up Vercel project link
        run: |
          mkdir -p apps/api/.vercel
          echo '{"projectId":"'"$VERCEL_PROJECT_ID"'","orgId":"'"$VERCEL_ORG_ID"'"}' > apps/api/.vercel/project.json
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_API_PROJECT_ID }}

      - name: Pull Vercel environment
        working-directory: apps/api
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_API_PROJECT_ID }}

      - name: Ensure npm accessible to child processes
        run: |
          NPM_BIN="$(which npm)"
          echo "$(dirname "$NPM_BIN")" >> $GITHUB_PATH
          sudo ln -sf "$NPM_BIN" /usr/local/bin/npm

      - name: Build Vercel output
        working-directory: apps/api
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_API_PROJECT_ID }}

      - name: Deploy to Vercel production
        id: deploy
        working-directory: apps/api
        run: |
          MAX_RETRIES=4
          DELAY=2
          for i in $(seq 1 $MAX_RETRIES); do
            echo "Deployment attempt $i/$MAX_RETRIES..."
            if DEPLOY_URL=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}); then
              echo "url=${DEPLOY_URL}" >> $GITHUB_OUTPUT
              exit 0
            fi
            if [ "$i" -lt "$MAX_RETRIES" ]; then
              echo "Attempt $i failed, retrying in ${DELAY}s..."
              sleep $DELAY
              DELAY=$((DELAY * 2))
            fi
          done
          echo "::error::All $MAX_RETRIES deployment attempts failed"
          exit 1
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_API_PROJECT_ID }}

      - name: Verify deployment health
        if: steps.deploy.outputs.url != ''
        run: |
          echo "Checking health endpoint..."
          HEALTH_URL="${{ steps.deploy.outputs.url }}/health"
          for i in 1 2 3; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$HEALTH_URL" || true)
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed"
              break
            fi
            [ "$i" -lt 3 ] && sleep 5
          done
          if [ "$STATUS" != "200" ]; then
            echo "::warning::Health check returned $STATUS — deployment may need attention"
          fi

      - name: Deployment summary
        run: |
          SHORT_SHA="${GITHUB_SHA:0:7}"
          echo "### Deployed API to Production (Vercel)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **API URL** | [${API_URL}](${API_URL}) |" >> $GITHUB_STEP_SUMMARY
          echo "| **Vercel URL** | ${{ steps.deploy.outputs.url }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`${SHORT_SHA}\` |" >> $GITHUB_STEP_SUMMARY
