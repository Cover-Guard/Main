name: Deploy

on:
  push:
    branches: [main]

env:
  BASE44_APP_URL: https://coverguard-admin-app-c9e3c94e.base44.app
  BASE44_PROJECT_ID: c9e3c94e

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  # ── Database migrations (run first, before deploying code) ───────────────────
  migrate:
    name: Run DB Migrations
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci --workspace=@coverguard/api
      - name: Verify DATABASE_URL is set
        id: check-db-url
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "::warning::DATABASE_URL secret is not configured for the production environment - skipping migration"
            echo "db_url_set=false" >> $GITHUB_OUTPUT
          else
            echo "db_url_set=true" >> $GITHUB_OUTPUT
          fi
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
      - name: Run Prisma migrations
        if: steps.check-db-url.outputs.db_url_set == 'true'
        working-directory: apps/api
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}

  # ── Base44 deployment summary ─────────────────────────────────────────────
  base44-deploy-summary:
    name: Base44 Deploy Summary
    runs-on: ubuntu-latest
    needs: [migrate]
    if: always()
    steps:
      - name: Report Base44 deployment target
        run: |
          echo "### Base44 Deployment" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **App URL** | [$BASE44_APP_URL]($BASE44_APP_URL) |" >> $GITHUB_STEP_SUMMARY
          echo "| **Project ID** | \`$BASE44_PROJECT_ID\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`${GITHUB_SHA:0:7}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Deployed via** | \`base44\` branch sync (see sync-base44 workflow) |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> The \`sync-base44\` workflow pushes this commit to the \`base44\` branch," >> $GITHUB_STEP_SUMMARY
          echo "> which triggers an automatic redeployment of the Base44 app." >> $GITHUB_STEP_SUMMARY
