name: Deploy to Vercel

on:
  push:
    branches: [main]

env:
  PRODUCTION_URL: https://coverguard.io
  API_URL: https://api.coverguard.io

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  # ── NOTE: DB migrations are handled by Supabase GitHub Integration ───────────
  # Schema changes go in supabase/migrations/*.sql and are auto-applied by
  # Supabase when pushed to the linked branch. Prisma is used as ORM only —
  # `prisma generate` creates the client, no `prisma migrate` needed.

  # ── Deploy Web to Vercel ──────────────────────────────────────────────────────
  deploy-web:
    name: Deploy Web to Vercel
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Ensure node/npm/sh accessible to child processes
        run: |
          NODE_BIN_DIR="$(dirname "$(which node)")"
          echo "$NODE_BIN_DIR" >> $GITHUB_PATH
          echo "/bin" >> $GITHUB_PATH
          echo "/usr/bin" >> $GITHUB_PATH
          sudo ln -sf "$NODE_BIN_DIR/node" /usr/local/bin/node
          sudo ln -sf "$NODE_BIN_DIR/npm" /usr/local/bin/npm
          sudo ln -sf "$NODE_BIN_DIR/npx" /usr/local/bin/npx
          sudo ln -sf /bin/sh /usr/local/bin/sh
          sudo ln -sf /usr/bin/env /usr/local/bin/env

      - name: Install dependencies
        run: npm ci

      - name: Install Vercel CLI and turbo globally
        run: npm install --global vercel@latest turbo

      - name: Set up Vercel project link
        run: |
          mkdir -p .vercel
          echo '{"projectId":"'"$VERCEL_PROJECT_ID"'","orgId":"'"$VERCEL_ORG_ID"'"}' > .vercel/project.json
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_WEB_PROJECT_ID }}

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_WEB_PROJECT_ID }}

      - name: Build project
        run: |
          export PATH="/bin:/usr/bin:/usr/local/bin:$PATH"
          vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_WEB_PROJECT_ID }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          API_REWRITE_URL: ${{ env.API_URL }}
          NEXT_PUBLIC_SITE_URL: ${{ env.PRODUCTION_URL }}

      - name: Deploy to Vercel production
        id: deploy
        run: |
          MAX_RETRIES=3
          for i in $(seq 1 $MAX_RETRIES); do
            echo "Deployment attempt $i/$MAX_RETRIES..."
            if DEPLOY_URL=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}); then
              echo "url=${DEPLOY_URL}" >> $GITHUB_OUTPUT
              break
            elif [ "$i" -lt "$MAX_RETRIES" ]; then
              echo "Attempt $i failed, retrying in 30s..."
              sleep 30
            else
              echo "All $MAX_RETRIES deployment attempts failed"
              exit 1
            fi
          done
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_WEB_PROJECT_ID }}

      - name: Deployment summary
        run: |
          SHORT_SHA="${GITHUB_SHA:0:7}"
          echo "### Deployed to Production (Vercel)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **Production URL** | [${PRODUCTION_URL}](${PRODUCTION_URL}) |" >> $GITHUB_STEP_SUMMARY
          echo "| **Vercel URL** | ${{ steps.deploy.outputs.url }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`${SHORT_SHA}\` |" >> $GITHUB_STEP_SUMMARY

  # ── Deploy API to Vercel ──────────────────────────────────────────────────────
  deploy-api:
    name: Deploy API to Vercel
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Ensure node/npm/sh accessible to child processes
        run: |
          NODE_BIN_DIR="$(dirname "$(which node)")"
          echo "$NODE_BIN_DIR" >> $GITHUB_PATH
          echo "/bin" >> $GITHUB_PATH
          echo "/usr/bin" >> $GITHUB_PATH
          sudo ln -sf "$NODE_BIN_DIR/node" /usr/local/bin/node
          sudo ln -sf "$NODE_BIN_DIR/npm" /usr/local/bin/npm
          sudo ln -sf "$NODE_BIN_DIR/npx" /usr/local/bin/npx
          sudo ln -sf /bin/sh /usr/local/bin/sh
          sudo ln -sf /usr/bin/env /usr/local/bin/env

      - name: Install dependencies
        run: npm ci

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      # Build shared package first (API depends on it), then generate
      # Prisma client and bundle the API into dist/index.js via tsup.
      - name: Build shared package
        run: npm run build --workspace=@coverguard/shared

      - name: Sanitize Supabase secrets
        run: |
          CLEAN_ID="$(printf '%s' "$RAW_PROJECT_ID" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"
          CLEAN_PW="$(printf '%s' "$RAW_DB_PASSWORD" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"
          CLEAN_POOLER="$(printf '%s' "$RAW_POOLER_HOST" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"
          {
            echo "SUPABASE_PROJECT_ID<<GHEOF"
            printf '%s\n' "$CLEAN_ID"
            echo "GHEOF"
            echo "SUPABASE_DB_PASSWORD<<GHEOF"
            printf '%s\n' "$CLEAN_PW"
            echo "GHEOF"
            echo "SUPABASE_POOLER_HOST<<GHEOF"
            printf '%s\n' "$CLEAN_POOLER"
            echo "GHEOF"
          } >> "$GITHUB_ENV"
          echo "Sanitized — Project ID length: ${#CLEAN_ID}, Password length: ${#CLEAN_PW}, Pooler: ${CLEAN_POOLER}"
        env:
          RAW_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
          RAW_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          RAW_POOLER_HOST: ${{ secrets.SUPABASE_POOLER_HOST }}

      - name: Build DB connection URLs
        run: |
          ENCODED_PW=$(node -e "process.stdout.write(encodeURIComponent(process.env.SUPABASE_DB_PASSWORD))")
          POOLER_HOST="${SUPABASE_POOLER_HOST}"
          DIRECT_HOST="db.${SUPABASE_PROJECT_ID}.supabase.co"
          DB_USER="postgres.${SUPABASE_PROJECT_ID}"

          {
            echo "DATABASE_URL<<GHEOF"
            printf '%s\n' "postgresql://${DB_USER}:${ENCODED_PW}@${POOLER_HOST}:6543/postgres?pgbouncer=true"
            echo "GHEOF"
            echo "DIRECT_URL<<GHEOF"
            printf '%s\n' "postgresql://postgres:${ENCODED_PW}@${DIRECT_HOST}:5432/postgres"
            echo "GHEOF"
          } >> "$GITHUB_ENV"

          echo "Connection URLs built — pooler: ${POOLER_HOST}, direct: ${DIRECT_HOST}"

      - name: Generate Prisma client
        working-directory: apps/api
        run: npx prisma generate

      - name: Build API bundle
        run: npm run build --workspace=@coverguard/api

      # Remove the workspace file: dependency so Vercel installs from
      # the registry instead of trying to resolve the monorepo link.
      # The shared package is already inlined in the tsup bundle.
      - name: Strip workspace dep from package.json
        working-directory: apps/api
        run: |
          node -e "
            const p = require('./package.json');
            delete p.dependencies['@coverguard/shared'];
            require('fs').writeFileSync('package.json', JSON.stringify(p, null, 2) + '\n');
          "

      - name: Set up Vercel project link
        run: |
          mkdir -p apps/api/.vercel
          echo '{"projectId":"'"$VERCEL_PROJECT_ID"'","orgId":"'"$VERCEL_ORG_ID"'"}' > apps/api/.vercel/project.json
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_API_PROJECT_ID }}

      - name: Pull Vercel environment
        working-directory: apps/api
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_API_PROJECT_ID }}

      - name: Build Vercel output
        working-directory: apps/api
        run: |
          # Prepend /bin and /usr/bin to PATH inline so the Vercel CLI's
          # child_process.spawn('sh', ...) can resolve sh. GITHUB_PATH and
          # symlinks don't help because Vercel CLI inherits process.env.PATH
          # at spawn time, not the shell's PATH.
          export PATH="/bin:/usr/bin:/usr/local/bin:$PATH"
          vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_API_PROJECT_ID }}

      - name: Deploy to Vercel production
        id: deploy
        working-directory: apps/api
        run: |
          MAX_RETRIES=4
          DELAY=2
          for i in $(seq 1 $MAX_RETRIES); do
            echo "Deployment attempt $i/$MAX_RETRIES..."
            if DEPLOY_URL=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}); then
              echo "url=${DEPLOY_URL}" >> $GITHUB_OUTPUT
              exit 0
            fi
            if [ "$i" -lt "$MAX_RETRIES" ]; then
              echo "Attempt $i failed, retrying in ${DELAY}s..."
              sleep $DELAY
              DELAY=$((DELAY * 2))
            fi
          done
          echo "::error::All $MAX_RETRIES deployment attempts failed"
          exit 1
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_API_PROJECT_ID }}

      - name: Verify deployment health
        if: steps.deploy.outputs.url != ''
        run: |
          echo "Checking health endpoint on production URL..."
          # Use production API URL instead of Vercel deployment URL to avoid
          # Vercel Deployment Protection returning 401 on preview/deploy URLs.
          HEALTH_URL="${{ env.API_URL }}/health"
          echo "Health URL: $HEALTH_URL"
          # Brief wait for edge propagation after production deploy
          sleep 5
          for i in 1 2 3; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$HEALTH_URL" || true)
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed"
              break
            fi
            echo "Attempt $i: got $STATUS, retrying..."
            [ "$i" -lt 3 ] && sleep 5
          done
          if [ "$STATUS" != "200" ]; then
            echo "::warning::Health check returned $STATUS — deployment may need attention"
          fi

      - name: Deployment summary
        run: |
          SHORT_SHA="${GITHUB_SHA:0:7}"
          echo "### Deployed API to Production (Vercel)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **API URL** | [${API_URL}](${API_URL}) |" >> $GITHUB_STEP_SUMMARY
          echo "| **Vercel URL** | ${{ steps.deploy.outputs.url }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`${SHORT_SHA}\` |" >> $GITHUB_STEP_SUMMARY
