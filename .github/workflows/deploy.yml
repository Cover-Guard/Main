name: Deploy to Vercel

on:
  push:
    branches: [main]

env:
  PRODUCTION_URL: https://coverguard.io
  API_URL: https://api.coverguard.io

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  # ── Run DB Migrations ─────────────────────────────────────────────────────────
  migrate:
    name: Run DB Migrations
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci --workspace=@coverguard/api

      - name: Verify database connectivity
        id: check-db-url
        run: |
          # Both secrets must be present
          if [ -z "$DATABASE_URL" ]; then
            echo "::warning::DATABASE_URL secret is not configured — skipping migration"
            echo "db_url_set=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          if [ -z "$DIRECT_URL" ]; then
            echo "::warning::DIRECT_URL secret is not configured — skipping migration"
            echo "::warning::Set DIRECT_URL to the Supabase Session Mode pooler URL, e.g."
            echo "::warning::  postgresql://postgres.[PROJECT_REF]:[PASSWORD]@aws-0-[REGION].pooler.supabase.com:5432/postgres"
            echo "db_url_set=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Validate DIRECT_URL scheme
          if ! echo "$DIRECT_URL" | grep -qE '^postgres(ql)?://'; then
            echo "::error::DIRECT_URL has an invalid scheme — must start with postgresql:// or postgres://"
            echo "db_url_set=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Parse host and port from DIRECT_URL using Node.js URL parser
          DB_HOST=$(node -e "try{const u=new URL(process.env.DIRECT_URL);process.stdout.write(u.hostname);}catch(e){process.exit(1);}" 2>/dev/null) || {
            echo "::error::DIRECT_URL could not be parsed as a valid URL"
            echo "db_url_set=false" >> $GITHUB_OUTPUT
            exit 0
          }
          DB_PORT=$(node -e "try{const u=new URL(process.env.DIRECT_URL);process.stdout.write(u.port||'5432');}catch(e){process.exit(1);}" 2>/dev/null) || DB_PORT="5432"
          echo "Testing TCP connectivity to ${DB_HOST}:${DB_PORT}..."
          if ! nc -z -w 10 "${DB_HOST}" "${DB_PORT}" 2>/dev/null; then
            echo "::warning::Cannot reach ${DB_HOST}:${DB_PORT} from GitHub Actions — skipping migration"
            echo "::warning::DIRECT_URL must point to the Supabase Session Mode pooler, not the direct db.*.supabase.co endpoint"
            echo "::warning::Update the DIRECT_URL secret to:"
            echo "::warning::  postgresql://postgres.[PROJECT_REF]:[PASSWORD]@aws-0-[REGION].pooler.supabase.com:5432/postgres"
            echo "db_url_set=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "db_url_set=true" >> $GITHUB_OUTPUT
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}

      - name: Run Prisma migrations
        if: steps.check-db-url.outputs.db_url_set == 'true'
        working-directory: apps/api
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}

  # ── Deploy Web to Vercel ──────────────────────────────────────────────────────
  deploy-web:
    name: Deploy Web to Vercel
    runs-on: ubuntu-latest
    needs: [migrate]
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build project
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy to Vercel production
        id: deploy
        run: |
          DEPLOY_URL=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=${DEPLOY_URL}" >> $GITHUB_OUTPUT
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deployment summary
        run: |
          SHORT_SHA="${GITHUB_SHA:0:7}"
          echo "### Deployed to Production (Vercel)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **Production URL** | [${PRODUCTION_URL}](${PRODUCTION_URL}) |" >> $GITHUB_STEP_SUMMARY
          echo "| **Vercel URL** | ${{ steps.deploy.outputs.url }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`${SHORT_SHA}\` |" >> $GITHUB_STEP_SUMMARY
