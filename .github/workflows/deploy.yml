name: Deploy to Vercel

on:
  push:
    branches: [main]

env:
  PRODUCTION_URL: https://coverguard.io
  API_URL: https://api.coverguard.io

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  # ── Run DB Migrations ─────────────────────────────────────────────────────────
  migrate:
    name: Run DB Migrations
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci --workspace=@coverguard/api

      - name: Verify database connectivity
        id: check-db-url
        run: |
          # All Supabase DB secrets must be present
          if [ -z "$SUPABASE_PROJECT_ID" ] || [ -z "$SUPABASE_DB_PASSWORD" ] || [ -z "$SUPABASE_DB_REGION" ]; then
            echo "::warning::SUPABASE_PROJECT_ID, SUPABASE_DB_PASSWORD, and/or SUPABASE_DB_REGION secrets are not configured — skipping migration"
            echo "db_url_set=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Use the Supabase connection pooler (session mode, port 5432) instead of the
          # direct connection (db.*.supabase.co:5432) which is IPv6-only and unreachable
          # from GitHub Actions runners.
          POOLER_HOST="aws-0-${SUPABASE_DB_REGION}.pooler.supabase.com"

          echo "Testing TCP connectivity to ${POOLER_HOST}:5432..."
          if ! nc -z -w 10 "${POOLER_HOST}" 5432 2>/dev/null; then
            echo "::error::Cannot reach ${POOLER_HOST}:5432 from GitHub Actions — skipping migration"
            echo "db_url_set=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "Database is reachable"
          echo "db_url_set=true" >> $GITHUB_OUTPUT
        env:
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          SUPABASE_DB_REGION: ${{ secrets.SUPABASE_DB_REGION }}

      - name: Run Prisma migrations
        if: steps.check-db-url.outputs.db_url_set == 'true'
        working-directory: apps/api
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://postgres.${{ secrets.SUPABASE_PROJECT_ID }}:${{ secrets.SUPABASE_DB_PASSWORD }}@aws-0-${{ secrets.SUPABASE_DB_REGION }}.pooler.supabase.com:6543/postgres?pgbouncer=true
          DIRECT_URL: postgresql://postgres.${{ secrets.SUPABASE_PROJECT_ID }}:${{ secrets.SUPABASE_DB_PASSWORD }}@aws-0-${{ secrets.SUPABASE_DB_REGION }}.pooler.supabase.com:5432/postgres

  # ── Deploy Web to Vercel ──────────────────────────────────────────────────────
  deploy-web:
    name: Deploy Web to Vercel
    runs-on: ubuntu-latest
    needs: [migrate]
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Set up Vercel project link
        run: |
          mkdir -p .vercel
          echo '{"projectId":"'"$VERCEL_PROJECT_ID"'","orgId":"'"$VERCEL_ORG_ID"'"}' > .vercel/project.json
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_WEB_PROJECT_ID }}

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_WEB_PROJECT_ID }}

      - name: Ensure npm accessible to child processes
        run: |
          NPM_BIN="$(which npm)"
          echo "$(dirname "$NPM_BIN")" >> $GITHUB_PATH
          sudo ln -sf "$NPM_BIN" /usr/local/bin/npm

      - name: Build project
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_WEB_PROJECT_ID }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_API_URL: ${{ env.API_URL }}
          NEXT_PUBLIC_SITE_URL: ${{ env.PRODUCTION_URL }}

      - name: Deploy to Vercel production
        id: deploy
        run: |
          MAX_RETRIES=3
          for i in $(seq 1 $MAX_RETRIES); do
            echo "Deployment attempt $i/$MAX_RETRIES..."
            if DEPLOY_URL=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}); then
              echo "url=${DEPLOY_URL}" >> $GITHUB_OUTPUT
              break
            elif [ "$i" -lt "$MAX_RETRIES" ]; then
              echo "Attempt $i failed, retrying in 30s..."
              sleep 30
            else
              echo "All $MAX_RETRIES deployment attempts failed"
              exit 1
            fi
          done
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_WEB_PROJECT_ID }}

      - name: Deployment summary
        run: |
          SHORT_SHA="${GITHUB_SHA:0:7}"
          echo "### Deployed to Production (Vercel)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **Production URL** | [${PRODUCTION_URL}](${PRODUCTION_URL}) |" >> $GITHUB_STEP_SUMMARY
          echo "| **Vercel URL** | ${{ steps.deploy.outputs.url }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`${SHORT_SHA}\` |" >> $GITHUB_STEP_SUMMARY

  # ── Deploy API to Vercel ──────────────────────────────────────────────────────
  deploy-api:
    name: Deploy API to Vercel
    runs-on: ubuntu-latest
    needs: [migrate]
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build shared package
        run: npm run build --workspace=@coverguard/shared

      - name: Build API
        run: npm run build --workspace=@coverguard/api

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Set up Vercel project link
        run: |
          mkdir -p apps/api/.vercel
          echo '{"projectId":"'"$VERCEL_PROJECT_ID"'","orgId":"'"$VERCEL_ORG_ID"'"}' > apps/api/.vercel/project.json
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_API_PROJECT_ID }}

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: apps/api
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_API_PROJECT_ID }}

      - name: Ensure npm accessible to child processes
        run: |
          NPM_BIN="$(which npm)"
          echo "$(dirname "$NPM_BIN")" >> $GITHUB_PATH
          sudo ln -sf "$NPM_BIN" /usr/local/bin/npm

      - name: Strip workspace dep from package.json for Vercel
        working-directory: apps/api
        run: node -e "const p=require('./package.json');delete p.dependencies['@coverguard/shared'];require('fs').writeFileSync('package.json',JSON.stringify(p,null,2)+'\n')"

      - name: Build project artifacts
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: apps/api
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_API_PROJECT_ID }}

      - name: Deploy to Vercel production
        id: deploy
        run: |
          MAX_RETRIES=3
          for i in $(seq 1 $MAX_RETRIES); do
            echo "Deployment attempt $i/$MAX_RETRIES..."
            if DEPLOY_URL=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}); then
              echo "url=${DEPLOY_URL}" >> $GITHUB_OUTPUT
              break
            elif [ "$i" -lt "$MAX_RETRIES" ]; then
              echo "Attempt $i failed, retrying in 30s..."
              sleep 30
            else
              echo "All $MAX_RETRIES deployment attempts failed"
              exit 1
            fi
          done
        working-directory: apps/api
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_API_PROJECT_ID }}

      - name: Deployment summary
        run: |
          SHORT_SHA="${GITHUB_SHA:0:7}"
          echo "### Deployed API to Production (Vercel)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **API URL** | [${API_URL}](${API_URL}) |" >> $GITHUB_STEP_SUMMARY
          echo "| **Vercel URL** | ${{ steps.deploy.outputs.url }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`${SHORT_SHA}\` |" >> $GITHUB_STEP_SUMMARY
