name: Sync main → base44 & Deploy

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - closed   # fires for all closed PRs; we filter to merged below

# One run at a time. If a push to main and a PR merge both fire at once
# (which is the normal case — a merge creates a push), the push-triggered
# run takes priority and the PR-triggered one is cancelled.
concurrency:
  group: sync-base44
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

env:
  PRODUCTION_URL: https://coverguard.io
  BASE44_APP_URL: https://coverguard-admin-app-c9e3c94e.base44.app
  BASE44_PROJECT_ID: c9e3c94e

jobs:
  sync:
    name: Sync base44 with main
    # For PR events, only run when the PR was actually merged into main.
    # For push events, always run.
    if: >
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' &&
       github.event.pull_request.merged == true &&
       github.event.pull_request.base.ref == 'main')
    runs-on: ubuntu-latest

    outputs:
      merge_status: ${{ env.MERGE_STATUS }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch main and base44 branches
        run: |
          git fetch origin main
          if ! git ls-remote --exit-code origin refs/heads/base44; then
            echo "base44 branch does not exist – creating it from main."
            git checkout -b base44 origin/main
            git push origin base44
            echo "RESULT=created" >> "$GITHUB_ENV"
          else
            git fetch origin base44
            echo "RESULT=fetched" >> "$GITHUB_ENV"
          fi

      - name: Attempt fast-forward merge main into base44
        if: env.RESULT == 'fetched'
        id: merge
        run: |
          git checkout base44
          BEHIND=$(git rev-list --count HEAD..origin/main)
          AHEAD=$(git rev-list --count origin/main..HEAD)

          echo "base44 is ${AHEAD} commit(s) ahead and ${BEHIND} commit(s) behind main."

          if [ "$BEHIND" -eq 0 ]; then
            echo "base44 is already up-to-date with main. Nothing to do."
            echo "MERGE_STATUS=noop" >> "$GITHUB_ENV"
          elif git merge --ff-only origin/main 2>/dev/null; then
            echo "Fast-forward merge succeeded."
            echo "MERGE_STATUS=ff" >> "$GITHUB_ENV"
          else
            echo "Fast-forward not possible – attempting regular merge."
            if git merge --no-edit origin/main; then
              echo "Merge succeeded."
              echo "MERGE_STATUS=merged" >> "$GITHUB_ENV"
            else
              echo "Merge conflict detected."
              git merge --abort || true
              echo "MERGE_STATUS=conflict" >> "$GITHUB_ENV"
            fi
          fi

      - name: Set MERGE_STATUS for 'created' case
        if: env.RESULT == 'created'
        run: echo "MERGE_STATUS=created" >> "$GITHUB_ENV"

      - name: Push base44 to origin
        if: >
          env.MERGE_STATUS == 'ff' ||
          env.MERGE_STATUS == 'merged' ||
          env.MERGE_STATUS == 'created'
        run: git push origin base44

      # ── Post deployment comment on the merged PR ────────────────────────────
      - name: Post deployment comment on merged PR
        if: >
          github.event_name == 'pull_request' &&
          github.event.pull_request.merged == true &&
          (env.MERGE_STATUS == 'ff' || env.MERGE_STATUS == 'merged' || env.MERGE_STATUS == 'created' || env.MERGE_STATUS == 'noop')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          HEAD_SHA: ${{ github.event.pull_request.merge_commit_sha }}
        run: |
          SHORT_SHA="${HEAD_SHA:0:7}"

          gh pr comment "$PR_NUMBER" --body "$(cat <<EOF
          ### Deployed to Production

          **PR #${PR_NUMBER}** — ${PR_TITLE}

          | | |
          |---|---|
          | **Production URL** | [${PRODUCTION_URL}](${PRODUCTION_URL}) |
          | **API URL** | [https://api.coverguard.io](https://api.coverguard.io) |
          | **Base44 App** | [coverguard-admin-app](${BASE44_APP_URL}) |
          | **Project ID** | \`${BASE44_PROJECT_ID}\` |
          | **Commit** | \`${SHORT_SHA}\` |
          | **Branch synced** | \`base44\` |

          > Base44 will pick up the \`base44\` branch and redeploy automatically.
          EOF
          )"

      # ── Trigger Base44 deploy webhook (if BASE44_DEPLOY_HOOK secret is set) ─
      - name: Trigger Base44 deploy webhook
        if: >
          env.MERGE_STATUS == 'ff' ||
          env.MERGE_STATUS == 'merged' ||
          env.MERGE_STATUS == 'created'
        env:
          BASE44_DEPLOY_HOOK: ${{ secrets.BASE44_DEPLOY_HOOK }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          if [ -z "$BASE44_DEPLOY_HOOK" ]; then
            echo "BASE44_DEPLOY_HOOK secret not set — skipping webhook call."
            echo "(Add it under Settings → Secrets if Base44 provides a deploy hook URL)"
          else
            echo "Triggering Base44 deploy webhook…"
            HTTP_STATUS=$(curl -fsSL -o /dev/null -w "%{http_code}" \
              -X POST "$BASE44_DEPLOY_HOOK" \
              -H "Content-Type: application/json" \
              -d "{\"ref\":\"base44\",\"sha\":\"${HEAD_SHA}\",\"project\":\"${BASE44_PROJECT_ID}\"}")
            echo "Response status: ${HTTP_STATUS}"
          fi

      # ── Create PR for manual conflict resolution ────────────────────────────
      - name: Create PR for manual conflict resolution
        if: env.MERGE_STATUS == 'conflict'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          MAIN_SHA=$(git rev-parse origin/main)
          BASE44_SHA=$(git rev-parse origin/base44)
          BRANCH="sync/main-to-base44-$(date +%Y%m%d%H%M%S)"

          git checkout -b "$BRANCH" origin/base44
          git push origin "$BRANCH"

          PR_BODY_FILE=$(mktemp)
          {
            echo "## Automatic sync failed due to merge conflicts"
            echo ""
            echo "The automated workflow attempted to merge \`main\` (${MAIN_SHA}) into \`base44\` (${BASE44_SHA}) but encountered conflicts."
            echo ""
            echo "The production app at ${PRODUCTION_URL} will **not** be updated until this is resolved."
            echo ""
            echo "Please resolve the conflicts manually:"
            echo '```bash'
            echo "git fetch origin"
            echo "git checkout ${BRANCH}"
            echo "git merge origin/main"
            echo "# resolve conflicts"
            echo "git push origin ${BRANCH}"
            echo '```'
            echo ""
            echo "Once this PR is merged, \`base44\` will be back in sync with \`main\` and the app will redeploy."
          } > "$PR_BODY_FILE"

          gh pr create \
            --base base44 \
            --head "$BRANCH" \
            --title "chore: manual sync main → base44 (conflict)" \
            --body-file "$PR_BODY_FILE"
