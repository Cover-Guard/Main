name: PR Merged → Claude Code Sync

on:
  pull_request:
    types: [closed]
    branches: [main, master]

permissions:
  contents: read
  pull-requests: write

jobs:
  claude-sync:
    name: Summarise merged PR with Claude
    runs-on: ubuntu-latest

    steps:
      # Guard: set output so subsequent steps can be skipped when PR was not merged.
      - name: Check if PR was merged
        id: gate
        run: |
          merged="${{ github.event.pull_request.merged }}"
          if [[ "$merged" == "true" ]]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "PR was not merged — skipping summary."
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout repository
        if: steps.gate.outputs.run == 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Collect PR metadata ──────────────────────────────────────────────────
      - name: Gather PR diff and metadata
        if: steps.gate.outputs.run == 'true'
        id: pr_data
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER="${{ github.event.pull_request.number }}"
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"

          # Diff (capped to avoid exceeding API limits)
          DIFF=$(git diff "${BASE_SHA}..${HEAD_SHA}" -- \
                   '*.ts' '*.tsx' '*.js' '*.jsx' '*.json' '*.prisma' \
                 | head -c 60000)

          # Files changed
          FILES=$(git diff --name-only "${BASE_SHA}..${HEAD_SHA}" | head -80 | tr '\n' ', ')

          # Persist for next step
          {
            echo "pr_number=${PR_NUMBER}"
            echo "pr_title=${{ github.event.pull_request.title }}"
            echo "pr_author=${{ github.event.pull_request.user.login }}"
            echo "merged_by=${{ github.event.pull_request.merged_by.login }}"
            echo "base_branch=${{ github.event.pull_request.base.ref }}"
            echo "files=${FILES}"
          } >> "$GITHUB_OUTPUT"

          # Write diff to a file so the Python script can read it cleanly
          printf '%s' "$DIFF" > /tmp/pr_diff.txt

      # ── Call Claude API ──────────────────────────────────────────────────────
      - name: Call Claude API and write back PR comment
        if: steps.gate.outputs.run == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.pr_data.outputs.pr_number }}
          PR_TITLE: ${{ steps.pr_data.outputs.pr_title }}
          PR_AUTHOR: ${{ steps.pr_data.outputs.pr_author }}
          MERGED_BY: ${{ steps.pr_data.outputs.merged_by }}
          BASE_BRANCH: ${{ steps.pr_data.outputs.base_branch }}
          FILES_CHANGED: ${{ steps.pr_data.outputs.files }}
          REPO: ${{ github.repository }}
        run: |
          python3 - <<'PYEOF'
          import os, json, urllib.request, urllib.error, sys, time

          api_key      = os.environ["ANTHROPIC_API_KEY"]
          gh_token     = os.environ["GH_TOKEN"]
          pr_number    = os.environ["PR_NUMBER"]
          pr_title     = os.environ["PR_TITLE"]
          pr_author    = os.environ["PR_AUTHOR"]
          merged_by    = os.environ["MERGED_BY"]
          base_branch  = os.environ["BASE_BRANCH"]
          files_changed = os.environ["FILES_CHANGED"]
          repo         = os.environ["REPO"]

          with open("/tmp/pr_diff.txt") as f:
              diff = f.read().strip()

          # ── Build prompt ────────────────────────────────────────────────────
          system_prompt = (
              "You are a senior engineer reviewing a merged pull request for CoverGuard, "
              "a property insurability intelligence platform built with Next.js 15, "
              "Express 4, Supabase, and Prisma. "
              "Respond in concise GitHub-flavoured Markdown."
          )

          user_prompt = (
              f"A pull request has just been merged into `{base_branch}`.\n\n"
              f"**PR #{pr_number}** \u2014 {pr_title}\n"
              f"- **Author:** {pr_author}\n"
              f"- **Merged by:** {merged_by}\n"
              f"- **Files changed:** {files_changed}\n\n"
              f"<diff>\n{diff if diff else '(diff unavailable or empty)'}\n</diff>\n\n"
              "Please write a post-merge summary containing:\n"
              "1. **What changed** \u2013 a 2-4 sentence plain-English description.\n"
              "2. **Why it matters** \u2013 impact on the product or codebase.\n"
              "3. **Risk / follow-ups** \u2013 any concerns, tech debt, or suggested next steps (omit section if none).\n"
              "4. **Key files touched** \u2013 up to 5 bullet points.\n\n"
              "Keep the total response under 400 words. Start with a brief one-liner headline."
          )

          payload = {
              "model": "claude-sonnet-4-6",
              "max_tokens": 1024,
              "system": system_prompt,
              "messages": [{"role": "user", "content": user_prompt}],
          }

          # ── POST to Anthropic API (retry up to 3x) ──────────────────────────
          def call_anthropic(payload, retries=3):
              url = "https://api.anthropic.com/v1/messages"
              data = json.dumps(payload).encode()
              headers = {
                  "x-api-key": api_key,
                  "anthropic-version": "2023-06-01",
                  "content-type": "application/json",
              }
              for attempt in range(retries):
                  try:
                      req = urllib.request.Request(url, data=data, headers=headers, method="POST")
                      with urllib.request.urlopen(req, timeout=60) as resp:
                          return json.loads(resp.read())
                  except urllib.error.HTTPError as e:
                      body = e.read().decode()
                      if e.code in (429, 529) and attempt < retries - 1:
                          wait = 2 ** (attempt + 1)
                          print(f"Rate limited ({e.code}). Retrying in {wait}s…", flush=True)
                          time.sleep(wait)
                          continue
                      print(f"Anthropic API error {e.code}: {body}", file=sys.stderr)
                      sys.exit(1)
                  except Exception as exc:
                      if attempt < retries - 1:
                          time.sleep(2 ** (attempt + 1))
                          continue
                      print(f"Request failed: {exc}", file=sys.stderr)
                      sys.exit(1)

          result = call_anthropic(payload)
          summary = result["content"][0]["text"]

          # ── Post comment back to GitHub PR ───────────────────────────────────
          comment_body = (
              "## Claude Code — Post-Merge Summary\n\n"
              + summary
              + "\n\n---\n"
              + f"*Generated by [Claude Code](https://claude.ai/code) · PR #{pr_number} merged into `{base_branch}`*"
          )

          gh_payload = json.dumps({"body": comment_body}).encode()
          gh_url = f"https://api.github.com/repos/{repo}/issues/{pr_number}/comments"
          gh_headers = {
              "Authorization": f"Bearer {gh_token}",
              "Accept": "application/vnd.github+json",
              "X-GitHub-Api-Version": "2022-11-28",
              "Content-Type": "application/json",
          }

          req = urllib.request.Request(gh_url, data=gh_payload, headers=gh_headers, method="POST")
          with urllib.request.urlopen(req, timeout=30) as resp:
              resp_data = json.loads(resp.read())
              print(f"Comment posted: {resp_data['html_url']}", flush=True)

          PYEOF
